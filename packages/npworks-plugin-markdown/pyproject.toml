[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "npworks-plugin-markdown"
version = "0.0.1"
description = "NPworks 插件：Markdown 分栏编辑/预览"
requires-python = ">=3.9"
license = {text = "MIT"}
authors = [{name = "ruihua zhu", email = "ruihuazhu@126.com"}]
dependencies = [
    "npworks-ide",
    "markdown>=3.0",
    "pygments>=2.0",
    "PyQtWebEngine>=5.15",
]

[project.entry-points."npworks.plugins"]
markdown = "npworks_plugin_markdown:register"

[tool.setuptools.packages.find]
where = ["src"]
