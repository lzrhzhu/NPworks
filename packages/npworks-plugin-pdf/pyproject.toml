[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "npworks-plugin-pdf"
version = "0.0.1"
description = "NPworks 插件：PDF 查看器"
requires-python = ">=3.9"
license = {text = "MIT"}
authors = [{name = "ruihua zhu", email = "ruihuazhu@126.com"}]
dependencies = [
    "npworks-ide",
    "PyMuPDF>=1.20",
]

[project.entry-points."npworks.plugins"]
pdf = "npworks_plugin_pdf:register"

[tool.setuptools.packages.find]
where = ["src"]
