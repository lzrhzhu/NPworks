[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "npworks-content"
version = "0.0.2"
description = "NPworks — 计算物理交互式教材内容"
requires-python = ">=3.9"
license = {text = "MIT"}
readme = "README.md"
authors = [
    {name = "ruihua zhu", email = "ruihuazhu@126.com"},
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Education",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Education",
    "Topic :: Scientific/Engineering :: Physics",
]
dependencies = [
    "pyyaml>=6.0",
    "pyscf>=2.3",
]

[project.urls]
Homepage = "https://github.com/lzrhzhu/NPworks"
Repository = "https://github.com/lzrhzhu/NPworks"
Issues = "https://github.com/lzrhzhu/NPworks/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
npworks_content = ["content/**/*.py", "content/**/*.yaml"]
